services:
  api:
    image: software-barbearia/evolution-api:2.3.7-local.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://api:8080
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://smoke:smoke@postgres:5432/evolution_smoke?schema=evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_LOCAL_ENABLED: "false"
      AUTHENTICATION_API_KEY: smoke_only_non_secret_key_123456
      LOG_LEVEL: ERROR,WARN
    tmpfs:
      - /evolution/instances
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: evolution_smoke
      POSTGRES_USER: smoke
      POSTGRES_PASSWORD: smoke
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smoke -d evolution_smoke"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
