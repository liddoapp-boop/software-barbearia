services:
  api:
    image: software-barbearia/evolution-api:2.3.7-local.1
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EVOLUTION_BASE_REF: evoapicloud/evolution-api:v2.3.7@sha256:1bd8afc4a6cf48822e6cf02469aeae7bd35a12a6b616eacd1291926307f4d339
    container_name: barbearia-evolution-api-local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${EVOLUTION_API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}?schema=evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: barbearia_evolution_local
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_ERRORS: "true"
      RABBITMQ_ENABLED: "false"
      SQS_ENABLED: "false"
      WEBSOCKET_ENABLED: "false"
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"
      LOG_LEVEL: ERROR,WARN,INFO
      LOG_COLOR: "true"
    volumes:
      - barbearia_evolution_instances:/evolution/instances
    networks:
      - evolution-local
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    container_name: barbearia-evolution-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    volumes:
      - barbearia_evolution_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - evolution-local
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: barbearia-evolution-redis-local
    restart: unless-stopped
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - barbearia_evolution_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - evolution-local
    expose:
      - "6379"

volumes:
  barbearia_evolution_instances:
    name: barbearia_evolution_instances
  barbearia_evolution_postgres:
    name: barbearia_evolution_postgres
  barbearia_evolution_redis:
    name: barbearia_evolution_redis

networks:
  evolution-local:
    name: barbearia_evolution_local_net
    driver: bridge
