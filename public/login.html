<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar - Liddo Barber</title>
    <script>
      (function () {
        var mode = localStorage.getItem("sb.themeMode") || "dark";
        var isDark = mode === "dark" || (mode === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
      })();
    </script>
    <style>
      :root[data-theme="light"] {
        --bg:             #0b0c0e;
        --surface:        #131518;
        --text-primary:   #f3f1ec;
        --text-secondary: #aaa7a0;
        --text-tertiary:  #74726d;
        --border-default: #292c32;
        --accent:         #c89b5d;
        --error:          #cf2d56;
        --error-soft:     rgba(207, 45, 86, 0.08);
        --error-border:   rgba(207, 45, 86, 0.20);
        --shadow-card:    rgba(0,0,0,0.14) 0px 28px 70px 0px, rgba(0,0,0,0.1) 0px 14px 32px 0px, rgba(38,37,30,0.1) 0px 0px 0px 1px;
        --btn-bg:         #26251e;
        --btn-bg-hover:   #141410;
        --btn-tx:         #f2f1ed;
        --spinner-track:  rgba(242, 241, 237, 0.35);
        --spinner-head:   #f2f1ed;
      }

      :root[data-theme="dark"] {
        --bg:             #0b0c0e;
        --surface:        #131518;
        --text-primary:   #f3f1ec;
        --text-secondary: #aaa7a0;
        --text-tertiary:  #74726d;
        --border-default: #292c32;
        --accent:         #c89b5d;
        --error:          #e04a6f;
        --error-soft:     rgba(224, 74, 111, 0.10);
        --error-border:   rgba(224, 74, 111, 0.30);
        --shadow-card:    rgba(0,0,0,0.4) 0px 28px 70px 0px, rgba(0,0,0,0.3) 0px 14px 32px 0px, rgba(230,229,224,0.08) 0px 0px 0px 1px;
        --btn-bg:         #e6e5e0;
        --btn-bg-hover:   #ffffff;
        --btn-tx:         #1a1915;
        --spinner-track:  rgba(26, 25, 21, 0.30);
        --spinner-head:   #1a1915;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        background: var(--surface);
        border-radius: 8px;
        width: 100%;
        max-width: 360px;
        padding: 32px;
        box-shadow: var(--shadow-card);
      }

      .logo {
        font-family: system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 30px;
        letter-spacing: 0;
        color: var(--text-primary);
        text-align: center;
        margin-bottom: 4px;
      }

      .subtitle {
        display: none;
        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
        margin-bottom: 28px;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 6px;
        margin-top: 16px;
      }

      input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border-default);
        border-radius: 4px;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 14px;
        padding: 8px 10px;
        outline: none;
        transition: border-color .15s;
      }
      input::placeholder { color: var(--text-tertiary); }
      input:focus { border-color: var(--accent); }

      .btn {
        display: block;
        width: 100%;
        margin-top: 20px;
        padding: 10px 20px;
        background: var(--btn-bg);
        color: var(--btn-tx);
        border: none;
        border-radius: 8px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background .15s, opacity .15s;
      }
      .btn:hover:not(:disabled) { background: var(--btn-bg-hover); }
      .btn:disabled { opacity: .5; cursor: not-allowed; }

      .error {
        margin-top: 16px;
        background: var(--error-soft);
        border: 1px solid var(--error-border);
        border-radius: 4px;
        color: var(--error);
        font-size: 13px;
        padding: 8px 10px;
        display: none;
      }
      .error.show { display: block; }

      .spinner {
        display: inline-block;
        width: 14px; height: 14px;
        border: 2px solid var(--spinner-track);
        border-top-color: var(--spinner-head);
        border-radius: 50%;
        animation: spin .6s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="/styles/design-system.css" />
  </head>
  <body class="auth-screen">
    <div class="card">
      <div class="logo">Liddo Barber</div>

      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />

        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />

        <button type="submit" class="btn" id="submitBtn">Entrar</button>
      </form>

      <div class="error" id="errorMsg"></div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCXtxVz8lYUGdiTNBCkXX7ynOUSBJRUouw",
        authDomain: "liddo-barber.firebaseapp.com",
        projectId: "liddo-barber",
        storageBucket: "liddo-barber.firebasestorage.app",
        messagingSenderId: "924661107864",
        appId: "1:924661107864:web:f0f3014844e0e2555814ed",
      };

      const fbApp = initializeApp(firebaseConfig);
      const auth = getAuth(fbApp);

      const form = document.getElementById("loginForm");
      const submitBtn = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add("show");
      }

      function hideError() {
        errorMsg.classList.remove("show");
      }

      function persistSession(data) {
        const user = data.user || {};
        localStorage.setItem("sb.authSession", JSON.stringify({
          accessToken: data.accessToken,
          expiresAt: data.expiresAt,
          user: {
            id: user.id,
            email: user.email,
            name: user.name,
            role: user.role,
            activeUnitId: user.activeUnitId,
            unitIds: Array.isArray(user.unitIds) ? user.unitIds : [],
          },
        }));
        localStorage.setItem("authToken", data.accessToken);
      }

      async function loginWithBackend(email, password) {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error ?? "Email ou senha incorretos.");
        }

        return await res.json();
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>Entrando...';

        try {
          const credential = await signInWithEmailAndPassword(auth, email, password);
          const idToken = await credential.user.getIdToken();

          const res = await fetch("/auth/firebase", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idToken }),
          });

          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error ?? "Erro ao autenticar");
          }

          const data = await res.json();
          persistSession(data);

          window.location.href = "/";
        } catch (err) {
          try {
            const data = await loginWithBackend(email, password);
            persistSession(data);
            window.location.href = "/";
          } catch (backendErr) {
            const msg = err?.code === "auth/too-many-requests"
              ? "Muitas tentativas. Aguarde alguns minutos."
              : backendErr?.message ?? "Email ou senha incorretos.";
            showError(msg);
          }
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Entrar";
        }
      });
    </script>
  </body>
</html>
